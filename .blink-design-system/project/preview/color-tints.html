<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  * { margin: 0; box-sizing: border-box; }
  body { font-family: var(--font-body); background: #fff; padding: 22px 26px; }
  .row { display: grid; grid-template-columns: repeat(5, 1fr); gap: 12px; }
  .sw { border-radius: 12px; height: 86px; display: flex; flex-direction: column; justify-content: flex-end; padding: 10px; border: 1px solid rgba(0,0,0,0.06); }
  .name { font-weight: 700; font-size: 12px; font-family: var(--font-display); color: var(--warm-900); }
  .hex { font-size: 11px; color: var(--warm-600); font-variant-numeric: tabular-nums; }
  h4 { font-family: var(--font-display); font-size: 13px; color: var(--slate-500); font-weight: 600; margin-bottom: 12px; letter-spacing: 0.04em; }
</style>
</head>
<body>
  <h4>BRAND TINTS — pale pink surfaces & halos</h4>
  <div class="row">
    <div class="sw" style="background:#FFF1F2"><span class="name">tint-50</span><span class="hex">#FFF1F2</span></div>
    <div class="sw" style="background:#FFF0F3"><span class="name">tint-150</span><span class="hex">#FFF0F3</span></div>
    <div class="sw" style="background:#FFE1E3"><span class="name">tint-100</span><span class="hex">#FFE1E3</span></div>
    <div class="sw" style="background:#FDE8EE"><span class="name">tint-200</span><span class="hex">#FDE8EE</span></div>
    <div class="sw" style="background:#FBC9D6"><span class="name">tint-300</span><span class="hex">#FBC9D6</span></div>
  </div>
</body>
</html>
