<!-- @dsCard group="Type" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  * { margin: 0; box-sizing: border-box; }
  body { font-family: var(--font-body); background: #fff; padding: 24px 28px; }
  .tag { font-family: var(--font-body); font-size: 10px; color: var(--slate-400); font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; }
  .stack { display: flex; flex-direction: column; gap: 14px; }
  .item { display: flex; align-items: baseline; gap: 16px; }
  .spec { font-family: var(--font-body); font-size: 10px; color: var(--slate-400); width: 92px; flex-shrink: 0; font-variant-numeric: tabular-nums; }
</style>
</head>
<body>
  <div class="tag" style="margin-bottom:16px">Inter — Body, fields &amp; captions</div>
  <div class="stack">
    <div class="item"><span class="spec">600 · 16px</span><span style="font-family:var(--font-body);font-weight:600;font-size:16px;color:var(--slate-900)">Continue with your mobile number</span></div>
    <div class="item"><span class="spec">400 · 14px</span><span class="blink-body">Your delivery network is active today. Track orders, deposits and earnings in one place.</span></div>
    <div class="item"><span class="spec">500 · 12px</span><span class="blink-caption">Instant support for your operations</span></div>
    <div class="item"><span class="spec">500 · 10px</span><span class="blink-nav-label">Home · My Cart · Activities · Promos · Profile</span></div>
  </div>
</body>
</html>
