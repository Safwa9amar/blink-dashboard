<!-- @dsCard group="Components" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  * { margin: 0; box-sizing: border-box; }
  body { font-family: var(--font-body); background: var(--gray-100); padding: 40px 24px; display:flex; align-items:center; justify-content:center; height: 200px; }
  .nav { width: 360px; height: 70px; border-radius: 47px; background: rgba(243,244,246,0.94); backdrop-filter: blur(12px); box-shadow: var(--shadow-nav); display:flex; align-items:center; justify-content:space-between; padding: 0 10px; }
  .item { display:flex; flex-direction:column; align-items:center; gap: 4px; flex:1; }
  svg { display:block; }
  .lab { font-size: 9px; color: var(--gray-400); font-weight: 500; }
  .active { background: var(--blink-tint-50); border-radius: 999px; padding: 8px 16px; flex: 0 0 auto; margin: 0 2px; }
  .active .lab { color: var(--blink-500); font-weight: 600; }
</style>
</head>
<body>
  <div class="nav">
    <div class="item active">
      <svg width="23" height="23" viewBox="0 0 24 24" fill="var(--blink-500)" stroke="var(--blink-500)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><path d="M9 22V12h6v10" fill="#fff"/></svg>
      <span class="lab">Home</span>
    </div>
    <div class="item">
      <svg width="23" height="23" viewBox="0 0 24 24" fill="none" stroke="var(--gray-400)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>
      <span class="lab">My Cart</span>
    </div>
    <div class="item">
      <svg width="23" height="23" viewBox="0 0 24 24" fill="none" stroke="var(--gray-400)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="8" y="2" width="8" height="4" rx="1"/><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/><path d="M9 12h6M9 16h6"/></svg>
      <span class="lab">Activities</span>
    </div>
    <div class="item">
      <svg width="23" height="23" viewBox="0 0 24 24" fill="none" stroke="var(--gray-400)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="8" width="18" height="4" rx="1"/><path d="M12 8v13"/><path d="M19 12v7a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2v-7"/><path d="M7.5 8a2.5 2.5 0 0 1 0-5C11 3 12 8 12 8s1-5 4.5-5a2.5 2.5 0 0 1 0 5"/></svg>
      <span class="lab">Promos</span>
    </div>
    <div class="item">
      <svg width="23" height="23" viewBox="0 0 24 24" fill="none" stroke="var(--gray-400)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="4"/><path d="M6 21v-1a6 6 0 0 1 12 0v1"/></svg>
      <span class="lab">Profile</span>
    </div>
  </div>
</body>
</html>
