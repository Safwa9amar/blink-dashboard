<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  * { margin: 0; box-sizing: border-box; }
  body { font-family: var(--font-display); background: #fff; }
  .wrap { display: flex; height: 200px; }
  .pane { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 14px; }
  .pane.dark { background: var(--blink-500); }
  .lockup { display: flex; align-items: center; gap: 6px; }
  .lockup svg { width: 34px; height: 39px; display: block; }
  .word { font-size: 34px; font-weight: 800; letter-spacing: -0.01em; }
  .mark-pink { color: var(--blink-500); }
  .link-dark { color: var(--slate-900); }
  .on-pink { color: #fff; }
  .cap { font-family: var(--font-body); font-size: 11px; color: var(--slate-500); font-weight: 500; }
  .cap.light { color: rgba(255,255,255,0.85); }
  .mark-only svg { width: 30px; height: 34px; }
</style>
</head>
