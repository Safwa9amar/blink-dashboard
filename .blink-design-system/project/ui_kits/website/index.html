<style>
  .wrap { max-width:1200px; margin:0 auto; padding:0 32px; }

  /* NAV */
  nav.bar { position:sticky; top:0; z-index:50; background:rgba(255,255,255,0.82); backdrop-filter:blur(14px); border-bottom:1px solid var(--slate-100); }
  nav.bar .row { display:flex; align-items:center; gap:34px; height:74px; }
  .logo { display:flex; align-items:center; gap:7px; }
  .logo svg { width:26px; height:30px; }
  .logo b { font-family:var(--font-display); font-weight:800; font-size:24px; letter-spacing:-0.01em; }
  nav.bar .links { display:flex; gap:30px; margin-left:8px; }
  nav.bar .links a { font-family:var(--font-body); font-weight:500; font-size:15px; color:var(--slate-600); transition:color .15s; }
  nav.bar .links a:hover { color:var(--blink-500); }
  nav.bar .right { margin-left:auto; display:flex; align-items:center; gap:14px; }
  nav.bar .right a.signin { font-family:var(--font-display); font-weight:600; font-size:15px; color:var(--slate-700); }

  /* HERO */
  .hero { position:relative; overflow:hidden; padding:64px 0 90px; }
  .hero::before { content:''; position:absolute; width:760px; height:760px; border-radius:50%; background:radial-gradient(circle, rgba(255,225,227,0.7) 0%, rgba(255,241,242,0) 70%); right:-200px; top:-220px; z-index:0; }
  .hero .grid { position:relative; z-index:1; display:grid; grid-template-columns:1fr 460px; gap:40px; align-items:center; }
  .hero .pill-tag { display:inline-flex; align-items:center; gap:8px; background:var(--blink-tint-50); color:var(--blink-600); font-family:var(--font-display); font-weight:600; font-size:13px; padding:8px 15px; border-radius:var(--r-pill); }
  .hero .pill-tag .d { width:7px; height:7px; border-radius:50%; background:var(--spring-500); }
  .hero h1 { font-family:var(--font-display); font-weight:800; font-size:62px; line-height:1.04; letter-spacing:-0.01em; margin:22px 0 0; color:var(--slate-900); }
  .hero h1 .pink { color:var(--blink-500); }
  .hero p.lead { font-size:19px; line-height:1.6; color:var(--slate-600); margin-top:22px; max-width:500px; }
  .hero .cta { display:flex; gap:14px; margin-top:34px; }
  .store-badges { display:flex; gap:12px; margin-top:26px; }
  .store-badge { display:flex; align-items:center; gap:11px; background:var(--slate-900); color:#fff; border-radius:14px; padding:10px 18px; }
  .store-badge svg { width:24px; height:24px; }
  .store-badge .s { font-size:10px; opacity:.8; line-height:1; }
  .store-badge .n { font-family:var(--font-display); font-weight:600; font-size:16px; line-height:1.2; }
  .hero .trust { display:flex; align-items:center; gap:14px; margin-top:30px; }
  .hero .trust .stars { color:#FFB400; font-size:16px; letter-spacing:2px; }
  .hero .trust span { font-size:14px; color:var(--slate-500); }

  /* phone mockup */
  .phone-mock { width:300px; height:610px; margin:0 auto; background:#fff; border-radius:42px; box-shadow:var(--shadow-lg), 0 0 0 9px #0b0b0e, 0 0 0 11px #2a2b30; overflow:hidden; position:relative; }
  .pm-status { height:42px; display:flex; align-items:center; justify-content:space-between; padding:0 22px; color:#fff; font-family:var(--font-body); font-weight:700; font-size:13px; }
  .pm-head { background:var(--grad-header); padding:0 20px 22px; color:#fff; }
  .pm-head .loc { font-size:11px; opacity:.85; }
  .pm-head .addr { font-family:var(--font-display); font-weight:700; font-size:15px; display:flex; align-items:center; gap:5px; }
  .pm-search { background:#fff; border-radius:var(--r-pill); margin-top:14px; padding:11px 16px; display:flex; align-items:center; gap:9px; color:var(--slate-400); font-size:13px; }
  .pm-body { padding:18px 20px; }
  .pm-deal { background:var(--grad-deal); border-radius:16px; height:96px; position:relative; overflow:hidden; display:flex; flex-direction:column; justify-content:center; padding:0 18px; color:#fff; }
  .pm-deal .b { position:absolute; border-radius:50%; background:rgba(255,255,255,0.16); }
  .pm-deal .big { font-family:var(--font-display); font-weight:800; font-size:24px; }
  .pm-deal .sub { font-family:var(--font-display); font-weight:600; font-size:13px; }
  .pm-svc { display:grid; grid-template-columns:repeat(4,1fr); gap:10px; margin-top:18px; }
  .pm-svc .s { display:flex; flex-direction:column; align-items:center; gap:7px; }
  .pm-svc .ic { width:52px; height:52px; border-radius:16px; background:var(--blink-tint-50); display:flex; align-items:center; justify-content:center; }
  .pm-svc .ic svg { width:24px; height:24px; color:var(--blink-500); }
  .pm-svc .lb { font-family:var(--font-body); font-weight:500; font-size:10px; color:var(--slate-600); }
  .pm-sec { font-family:var(--font-display); font-weight:700; font-size:15px; margin:20px 0 12px; }
  .pm-rest { display:flex; gap:12px; }
  .pm-card { flex:1; border-radius:14px; overflow:hidden; border:1px solid var(--slate-100); box-shadow:var(--shadow-sm); }
  .pm-card .img { height:64px; }
  .pm-card .t { padding:9px 11px; }
  .pm-card .t .nm { font-family:var(--font-display); font-weight:700; font-size:12px; }
  .pm-card .t .mt { font-size:10px; color:var(--slate-400); margin-top:2px; }
  .pm-nav { position:absolute; left:16px; right:16px; bottom:14px; height:58px; background:rgba(243,244,246,0.96); backdrop-filter:blur(10px); border-radius:40px; box-shadow:var(--shadow-md); display:flex; align-items:center; justify-content:space-around; }
  .pm-nav svg { width:21px; height:21px; }

  /* SERVICES */
  .services { padding:60px 0; }
  .sec-head { text-align:center; max-width:640px; margin:0 auto 48px; }
  .sec-head h2 { font-family:var(--font-display); font-weight:800; font-size:40px; letter-spacing:-0.01em; margin-top:12px; line-height:1.1; }
  .sec-head p { font-size:17px; line-height:1.6; color:var(--slate-600); margin-top:14px; }
  .svc-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:20px; }
  .svc { border:1px solid var(--slate-200); border-radius:var(--r-xl); padding:28px; transition:transform .18s, box-shadow .18s, border-color .18s; cursor:pointer; }
  .svc:hover { transform:translateY(-5px); box-shadow:var(--shadow-md); border-color:var(--blink-300); }
  .svc .ic { width:58px; height:58px; border-radius:17px; background:var(--blink-tint-50); display:flex; align-items:center; justify-content:center; margin-bottom:20px; }
  .svc .ic svg { width:28px; height:28px; color:var(--blink-500); }
  .svc h3 { font-family:var(--font-display); font-weight:700; font-size:20px; }
  .svc p { font-size:14px; line-height:1.55; color:var(--slate-500); margin-top:8px; }

  /* AUDIENCE SECTIONS */
  .aud { padding:80px 0; }
  .aud .split { display:grid; grid-template-columns:1fr 1fr; gap:64px; align-items:center; }
  .aud.alt { background:var(--slate-50); }
  .aud h2 { font-family:var(--font-display); font-weight:800; font-size:42px; letter-spacing:-0.01em; line-height:1.08; margin-top:14px; }
  .aud p.body { font-size:17px; line-height:1.65; color:var(--slate-600); margin-top:18px; }
  .feat-list { display:flex; flex-direction:column; gap:16px; margin-top:28px; }
  .feat { display:flex; gap:14px; align-items:flex-start; }
  .feat .ck { width:30px; height:30px; border-radius:9px; background:var(--blink-tint-50); display:flex; align-items:center; justify-content:center; flex-shrink:0; }
  .feat .ck svg { width:16px; height:16px; color:var(--blink-500); }
  .feat .tx b { font-family:var(--font-display); font-weight:700; font-size:16px; display:block; }
  .feat .tx span { font-size:14px; color:var(--slate-500); line-height:1.5; }
  .aud .cta-row { margin-top:34px; display:flex; gap:14px; }

  /* visual panels for audience sections */
  .panel { border-radius:var(--r-2xl); overflow:hidden; position:relative; min-height:460px; box-shadow:var(--shadow-md); }
  .panel.merch { background:linear-gradient(160deg,#1E293B 0%,#0F172A 100%); padding:34px; }
  .panel.rider { background:var(--grad-hero); padding:34px; }
  /* mini dashboard card inside merchant panel */
  .mini-dash { background:#fff; border-radius:18px; overflow:hidden; box-shadow:var(--shadow-lg); }
  .md-top { display:flex; align-items:center; justify-content:space-between; padding:14px 18px; border-bottom:1px solid var(--slate-100); }
  .md-top .ttl { font-family:var(--font-display); font-weight:700; font-size:14px; }
  .md-top .av { width:26px; height:26px; border-radius:50%; background:var(--blink-tint-100); }
  .md-stat-row { display:grid; grid-template-columns:1fr 1fr; gap:12px; padding:16px 18px; }
  .md-stat { background:var(--slate-50); border-radius:12px; padding:13px; }
  .md-stat .l { font-size:10px; color:var(--slate-500); font-weight:600; text-transform:uppercase; letter-spacing:.05em; }
  .md-stat .v { font-family:var(--font-display); font-weight:800; font-size:20px; margin-top:3px; }
  .md-stat .up { font-size:10px; color:var(--success); font-weight:700; }
  .md-chart { padding:0 18px 18px; }
  .md-chart .bars { display:flex; align-items:flex-end; gap:7px; height:74px; }
  .md-chart .bars div { flex:1; border-radius:5px 5px 0 0; background:var(--blink-tint-300); }
  .md-chart .bars div:last-child { background:var(--blink-500); }
  .panel .floaty { position:absolute; background:#fff; border-radius:14px; box-shadow:var(--shadow-lg); padding:13px 16px; display:flex; align-items:center; gap:11px; }
  .panel .floaty .ic { width:38px; height:38px; border-radius:11px; display:flex; align-items:center; justify-content:center; }
  .panel .floaty .l { font-size:11px; color:var(--slate-500); }
  .panel .floaty .v { font-family:var(--font-display); font-weight:800; font-size:16px; }
  /* rider earnings card */
  .rider-card { background:rgba(255,255,255,0.12); border:1px solid rgba(255,255,255,0.2); border-radius:20px; padding:24px; backdrop-filter:blur(4px); }
  .rider-card .lab { color:rgba(255,255,255,0.85); font-size:12px; font-weight:600; text-transform:uppercase; letter-spacing:.06em; }
  .rider-card .amt { font-family:var(--font-display); font-weight:800; font-size:40px; color:#fff; margin-top:6px; }
  .rider-card .sub { color:rgba(255,255,255,0.85); font-size:13px; margin-top:4px; }
  .rider-trips { display:flex; flex-direction:column; gap:10px; margin-top:20px; }
  .rt { display:flex; align-items:center; gap:12px; background:rgba(255,255,255,0.95); border-radius:14px; padding:12px 14px; }
  .rt .ic { width:38px; height:38px; border-radius:11px; background:var(--blink-tint-100); display:flex; align-items:center; justify-content:center; }
  .rt .ic svg { width:18px; height:18px; color:var(--blink-500); }
  .rt .m { flex:1; }
  .rt .m b { font-family:var(--font-display); font-weight:700; font-size:13px; display:block; }
  .rt .m span { font-size:11px; color:var(--slate-400); }
  .rt .amt2 { font-family:var(--font-display); font-weight:800; font-size:14px; color:var(--credit); }

  /* STATS band */
  .stats { background:var(--grad-hero); color:#fff; padding:64px 0; position:relative; overflow:hidden; }
  .stats::before { content:''; position:absolute; width:400px; height:400px; border-radius:50%; background:rgba(255,255,255,0.06); left:-100px; bottom:-180px; }
  .stats .row { display:grid; grid-template-columns:repeat(4,1fr); gap:20px; position:relative; z-index:1; text-align:center; }
  .stats .k { font-family:var(--font-display); font-weight:800; font-size:46px; line-height:1; }
  .stats .l { font-size:15px; opacity:.9; margin-top:10px; }

  /* coverage */
  .coverage { padding:70px 0; }
  .cities { display:flex; flex-wrap:wrap; gap:12px; justify-content:center; margin-top:36px; }
  .city { border:1px solid var(--slate-200); border-radius:var(--r-pill); padding:11px 22px; font-family:var(--font-display); font-weight:600; font-size:15px; color:var(--slate-700); transition:all .15s; }
  .city:hover { background:var(--blink-500); color:#fff; border-color:var(--blink-500); }

  /* download CTA */
  .download { padding:30px 0 90px; }
  .dl-box { background:var(--slate-900); border-radius:var(--r-2xl); padding:64px; position:relative; overflow:hidden; }
  .dl-box::before { content:''; position:absolute; width:500px; height:500px; border-radius:50%; background:radial-gradient(circle, rgba(238,51,95,0.4) 0%, rgba(238,51,95,0) 70%); right:-150px; top:-150px; }
  .dl-box .inner { position:relative; z-index:1; max-width:560px; }
  .dl-box h2 { font-family:var(--font-display); font-weight:800; font-size:42px; color:#fff; line-height:1.1; letter-spacing:-0.01em; }
  .dl-box p { font-size:17px; color:rgba(255,255,255,0.8); margin-top:16px; line-height:1.6; }
  .dl-box .store-badges { margin-top:30px; }
  .dl-box .store-badge { background:#fff; color:var(--slate-900); }

  /* footer */
  footer.site { background:#fff; border-top:1px solid var(--slate-100); padding:60px 0 40px; }
  footer.site .top { display:grid; grid-template-columns:1.6fr 1fr 1fr 1fr; gap:40px; }
  footer.site .brand p { font-size:14px; color:var(--slate-500); margin-top:16px; line-height:1.6; max-width:280px; }
  footer.site h4 { font-family:var(--font-display); font-weight:700; font-size:14px; margin-bottom:16px; }
  footer.site ul { list-style:none; display:flex; flex-direction:column; gap:11px; }
  footer.site ul a { font-size:14px; color:var(--slate-500); }
  footer.site ul a:hover { color:var(--blink-500); }
  footer.site .legal { border-top:1px solid var(--slate-100); margin-top:44px; padding-top:24px; display:flex; align-items:center; justify-content:space-between; }
  footer.site .legal span { font-size:13px; color:var(--slate-400); }
  footer.site .socials { display:flex; gap:16px; }
  footer.site .socials a { color:var(--slate-400); }
  footer.site .socials svg { width:20px; height:20px; }

  @media (max-width:980px) {
    .hero .grid, .aud .split { grid-template-columns:1fr; }
    .hero .grid > .phone-wrap { order:-1; }
    .svc-grid { grid-template-columns:1fr 1fr; }
    .stats .row { grid-template-columns:1fr 1fr; gap:36px 20px; }
    nav.bar .links { display:none; }
    .hero h1 { font-size:46px; }
    footer.site .top { grid-template-columns:1fr 1fr; gap:32px; }
  }
</style>
</head>
