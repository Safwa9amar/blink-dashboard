<!-- @dsCard group="Spacing" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  * { margin: 0; box-sizing: border-box; }
  body { font-family: var(--font-body); background: #fff; padding: 22px 26px; display:flex; gap: 22px; align-items:flex-end; height: 200px; }
  .col { display:flex; flex-direction:column; align-items:center; gap: 10px; }
  .box { width: 80px; height: 80px; background: var(--blink-tint-100); border: 1.5px solid var(--blink-500); }
  .nm { font-family: var(--font-display); font-weight: 700; font-size: 12px; color: var(--slate-900); }
  .vl { font-size: 11px; color: var(--slate-500); }
  .pill { width: 110px; height: 44px; border-radius: 999px; }
</style>
</head>
<body>
  <div class="col"><div class="box" style="border-radius:8px"></div><span class="nm">sm</span><span class="vl">8px</span></div>
  <div class="col"><div class="box" style="border-radius:12px"></div><span class="nm">md</span><span class="vl">12px</span></div>
  <div class="col"><div class="box" style="border-radius:16px"></div><span class="nm">lg</span><span class="vl">16px</span></div>
  <div class="col"><div class="box" style="border-radius:24px"></div><span class="nm">xl</span><span class="vl">24px</span></div>
  <div class="col"><div class="box" style="border-radius:32px"></div><span class="nm">2xl</span><span class="vl">32px</span></div>
  <div class="col"><div class="box pill" style="background:var(--blink-500);border:none"></div><span class="nm">pill</span><span class="vl">999px</span></div>
</body>
</html>
