  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

family: 'Poppins';\n  font-style: normal;\n  font-weight: 800;\n  font-display: swap;\n  src: url(\"b4b521e5-e9ed-4778-b7e6-42731af6faa1\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n<\u002Fstyle>\n\n<style>\n  :root { --pink:#EE335F; --tint:#FFF1F2; --slate900:#0F172A; --slate600:#475569; --slate500:#64748B; --slate400:#94A3B8; --slate200:#E2E8F0; --slate100:#F1F5F9; --slate50:#F8FAFC; --font-d:'Poppins',sans-serif; --font-b:'Inter',sans-serif; }\n  * { margin:0; padding:0; box-sizing:border-box; }\n  body { font-family:var(--font-b); color:var(--slate900); background:#fff; }\n  .wrap { max-width:1080px; margin:0 auto; padding:0 32px; }\n  header.top { background:linear-gradient(180deg,#FF6C90 0%,#EE3160 100%); color:#fff; padding:56px 0 46px; }\n  header.top .eyebrow { font-family:var(--font-d); font-weight:600; font-size:12px; letter-spacing:0.16em; text-transform:uppercase; opacity:.85; }\n  header.top h1 { font-family:var(--font-d); font-weight:800; font-size:42px; letter-spacing:-0.01em; margin-top:10px; }\n  header.top p { font-size:16px; line-height:1.6; opacity:.94; margin-top:14px; max-width:620px; }\n  .meta { display:flex; gap:30px; margin-top:26px; }\n  .meta .k { font-family:var(--font-d); font-weight:800; font-size:22px; }\n  .meta .l { font-size:12px; opacity:.85; margin-top:2px; }\n\n  section { padding:44px 0 0; }\n  .sec-label { font-family:var(--font-d); font-weight:700; font-size:11px; letter-spacing:0.12em; text-transform:uppercase; color:var(--pink); }\n  h2 { font-family:var(--font-d); font-weight:800; font-size:26px; margin:8px 0 4px; }\n  .desc { font-size:14.5px; line-height:1.6; color:var(--slate600); max-width:640px; margin-bottom:8px; }\n  code { font-family:ui-monospace,Menlo,monospace; font-size:0.9em; background:var(--slate100); padding:2px 6px; border-radius:5px; color:var(--pink); }\n\n  h3.grp { font-family:var(--font-d); font-weight:700; font-size:14px; color:var(--slate500); margin:30px 0 14px; letter-spacing:0.02em; }\n  .grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(112px,1fr)); gap:12px; }\n  .cell { border:1px solid var(--slate200); border-radius:14px; padding:16px 8px 12px; display:flex; flex-direction:column; align-items:center; gap:10px; transition:border-color .15s, background .15s; cursor:default; text-align:center; }\n  .cell:hover { border-color:var(--pink); background:var(--tint); }\n  .cell blink-icon { color:var(--slate900); }\n  .cell .nm { font-family:ui-monospace,Menlo,monospace; font-size:10px; color:var(--slate500); word-break:break-all; line-height:1.3; }\n\n  .custom-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(180px,1fr)); gap:16px; }\n  .ccell { border:1px solid var(--slate200); border-radius:18px; padding:24px; display:flex; flex-direction:column; align-items:center; gap:16px; }\n  .ccell img { width:56px; height:56px; }\n  .ccell .nm { font-family:var(--font-d); font-weight:700; font-size:15px; }\n  .ccell .sub { font-size:12px; color:var(--slate500); margin-top:-10px; }\n\n  .usage { background:var(--slate900); color:#e6edf3; border-radius:16px; padding:22px 24px; margin-top:18px; font-family:ui-monospace,Menlo,monospace; font-size:13px; line-height:1.7; overflow-x:auto; }\n  .usage .c { color:#7d8590; }\n  .usage .t { color:#7ee787; }\n  .usage .a { color:#79c0ff; }\n  footer { padding:48px 0 60px; }\n  footer .line { border-top:1px solid var(--slate200); padding-top:22px; color:var(--slate400); font-size:13px; }\n<\u002Fstyle>\n<\u002Fhead>\n<body>\n<header class=\"top\">\n  <div class=\"wrap\">\n    <div class=\"eyebrow\">Blink Design System<\u002Fdiv>\n    <h1>Icon System<\u002Fh1>\n    <p>Icons are named with Apple <strong>SF Symbol<\u002Fstrong> strings and map to <strong>Material Icons<\u002Fstrong> by default — the exact vocabulary from the app's <code style=\"background:rgba(255,255,255,0.18);color:#fff\">&lt;IconSymbol&gt;<\u002Fcode>. iOS renders native SF Symbols; Android &amp; web fall back to Material Icons, with a few FontAwesome brand glyphs for socials.<\u002Fp>\n    <div class=\"meta\">\n      <div><div class=\"k\">Material Icons<\u002Fdiv><div class=\"l\">primary family<\u002Fdiv><\u002Fdiv>\n      <div><div class=\"k\">SF Symbol<\u002Fdiv><div class=\"l\">naming API<\u002Fdiv><\u002Fdiv>\n      <div><div class=\"k\">FontAwesome<\u002Fdiv><div class=\"l\">socials &amp; globe<\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fheader>\n\n<div class=\"wrap\">\n  <section>\n    <div class=\"sec-label\">Brand<\u002Fdiv>\n    <h2>Custom service icons<\u002Fh2>\n    <p class=\"desc\">Bespoke two-tone glyphs for the core services — drawn in brand pink over near-black <code>#111827<\u002Fcode>. Lifted from the app's <code>CustomIcons.tsx<\u002Fcode>. Use these (not Material) for the headline service tiles.<\u002Fp>\n    <div class=\"custom-grid\">\n      <div class=\"ccell\"><img src=\"507b4804-d105-42e0-99f3-5fe8cbb067db\" alt=\"Marketplace\"><div class=\"nm\">Marketplace<\u002Fdiv><\u002Fdiv>\n      <div class=\"ccell\"><img src=\"b14f721e-de11-4241-bb45-38b02f836b29\" alt=\"Courier\"><div class=\"nm\">Courier<\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <section>\n    <div class=\"sec-label\">System<\u002Fdiv>\n    <h2>SF Symbol → Material Icons<\u002Fh2>\n    <p class=\"desc\">Call any icon by its SF-Symbol name with <code>&lt;blink-icon name=\"house.fill\"&gt;<\u002Fcode>. Filled SF names map to the filled Material glyph. Grouped below by use.<\u002Fp>\n    <div id=\"groups\"><\u002Fdiv>\n  <\u002Fsection>\n\n  <section>\n    <div class=\"sec-label\">Usage<\u002Fdiv>\n    <h2>How to use<\u002Fh2>\n    <div class=\"usage\">\n<span class=\"c\">&lt;!-- load once; it injects the Material Icons + FontAwesome fonts --&gt;<\u002Fspan>\n&lt;<span class=\"t\">script<\u002Fspan> <span class=\"a\">src<\u002Fspan>=<span style=\"color:#a5d6ff\">\"../icons/blink-icons.js\"<\u002Fspan>&gt;&lt;/<span class=\"t\">script<\u002Fspan>&gt;\n\n&lt;<span class=\"t\">blink-icon<\u002Fspan> <span class=\"a\">name<\u002Fspan>=<span style=\"color:#a5d6ff\">\"house.fill\"<\u002Fspan>&gt;&lt;/<span class=\"t\">blink-icon<\u002Fspan>&gt;\n&lt;<span class=\"t\">blink-icon<\u002Fspan> <span class=\"a\">name<\u002Fspan>=<span style=\"color:#a5d6ff\">\"cart.fill\"<\u002Fspan> <span class=\"a\">size<\u002Fspan>=<span style=\"color:#a5d6ff\">\"20\"<\u002Fspan> <span class=\"a\">color<\u002Fspan>=<span style=\"color:#a5d6ff\">\"#EE335F\"<\u002Fspan>&gt;&lt;/<span class=\"t\">blink-icon<\u002Fspan>&gt;\n&lt;<span class=\"t\">blink-icon<\u002Fspan> <span class=\"a\">name<\u002Fspan>=<span style=\"color:#a5d6ff\">\"tiktok\"<\u002Fspan>&gt;&lt;/<span class=\"t\">blink-icon<\u002Fspan>&gt;  <span class=\"c\">// FontAwesome brand<\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <footer><div class=\"line\">Blink Icon System · ported from <code>Safwa9amar/blink · components/ui/icon-symbol.tsx<\u002Fcode><\u002Fdiv><\u002Ffooter>\n<\u002Fdiv>\n\n<script src=\"a42856a1-fb6e-4091-9e89-5d56e9d174f5\"><\u002Fscript>\n<script>\n  const GROUPS = {\n    \"Navigation & tabs\": [\"house.fill\",\"cart.fill\",\"list.bullet.clipboard.fill\",\"gift.fill\",\"person.fill\",\"map.fill\",\"wallet.pass.fill\",\"chart.bar.fill\",\"storefront.fill\",\"square.grid.2x2.fill\"],\n    \"Services & commerce\": [\"bag.fill\",\"shippingbox.fill\",\"truck.fill\",\"fork.knife\",\"croissant.fill\",\"tshirt.fill\",\"desktopcomputer\",\"medical.kit.fill\",\"tag.fill\",\"bolt.fill\"],\n    \"Money & wallet\": [\"creditcard.fill\",\"banknote.fill\",\"dollarsign.circle.fill\",\"building.columns.fill\",\"wallet.bifold.fill\",\"qrcode\",\"ticket.fill\"],\n    \"Mobility\": [\"bicycle\",\"motorcycle\",\"scooter\",\"car.fill\",\"location.north.fill\",\"directions\",\"scope\",\"mappin.and.ellipse\"],\n    \"Status & feedback\": [\"checkmark.circle.fill\",\"checkmark.seal.fill\",\"checkmark.shield.fill\",\"exclamationmark.triangle.fill\",\"exclamationmark.circle.fill\",\"xmark.circle.fill\",\"info.circle.fill\",\"star.fill\",\"trophy.fill\",\"hand.thumbsup.fill\"],\n    \"Actions\": [\"plus.circle.fill\",\"pencil\",\"trash.fill\",\"magnifyingglass\",\"slider.horizontal.3\",\"line.3.horizontal.decrease\",\"square.and.arrow.up\",\"doc.on.doc.fill\",\"arrow.clockwise\",\"ellipsis\"],\n    \"Account & comms\": [\"person.circle\",\"person.badge.plus\",\"bell.fill\",\"envelope.fill\",\"phone.fill\",\"bubble.left.fill\",\"headphones\",\"lifebuoy.fill\",\"gearshape.fill\",\"rectangle.portrait.and.arrow.right\"],\n    \"Security & misc\": [\"lock.fill\",\"shield.fill\",\"eye.fill\",\"eye.slash.fill\",\"calendar\",\"clock.fill\",\"heart.fill\",\"camera.fill\",\"newspaper.fill\",\"megaphone.fill\"],\n    \"Social (FontAwesome)\": [\"facebook\",\"instagram\",\"twitter\",\"tiktok\",\"globe\",\"link\"],\n  };\n  const host = document.getElementById('groups');\n  for (const [title, names] of Object.entries(GROUPS)) {\n    const h = document.createElement('h3'); h.className = 'grp'; h.textContent = title; host.appendChild(h);\n    const g = document.createElement('div'); g.className = 'grid';\n    for (const n of names) {\n      const c = document.createElement('div'); c.className = 'cell';\n      c.innerHTML = `<blink-icon name=\"${n}\" size=\"28\"><\u002Fblink-icon><span class=\"nm\">${n}<\u002Fspan>`;\n      g.appendChild(c);\n    }\n    host.appendChild(g);\n  }\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
