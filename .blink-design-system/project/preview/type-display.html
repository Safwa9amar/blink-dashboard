<!-- @dsCard group="Type" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  * { margin: 0; box-sizing: border-box; }
  body { font-family: var(--font-body); background: #fff; padding: 24px 28px; }
  .tag { font-family: var(--font-body); font-size: 10px; color: var(--slate-400); font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; }
  .stack { display: flex; flex-direction: column; gap: 14px; }
  .item { display: flex; align-items: baseline; gap: 16px; }
  .spec { font-family: var(--font-body); font-size: 10px; color: var(--slate-400); width: 92px; flex-shrink: 0; font-variant-numeric: tabular-nums; }
</style>
</head>
<body>
  <div class="tag" style="margin-bottom:16px">Poppins — Display &amp; Headings · tracking +0.04em</div>
  <div class="stack">
    <div class="item"><span class="spec">800 · 30px</span><span class="blink-display">Get Your First Rider</span></div>
    <div class="item"><span class="spec">700 · 24px</span><span class="blink-h1">Hello, Agent Malik</span></div>
    <div class="item"><span class="spec">700 · 18px</span><span class="blink-h2">Top deals · Blink news</span></div>
    <div class="item"><span class="spec">600 · 16px</span><span class="blink-h3">Request a Courier</span></div>
  </div>
</body>
</html>
