<!-- @dsCard group="Type" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  * { margin: 0; box-sizing: border-box; }
  body { font-family: var(--font-display); background: #fff; padding: 20px 28px; }
  .scale { display:flex; align-items: baseline; gap: 4px; flex-wrap: wrap; }
  .s { color: var(--slate-900); font-weight: 700; letter-spacing: 0.04em; line-height: 1; }
  .tag { font-family: var(--font-body); font-size: 10px; color: var(--slate-400); font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; margin-bottom: 14px; }
</style>
</head>
<body>
  <div class="tag">Type scale — Poppins</div>
  <div class="scale">
    <span class="s" style="font-size:30px">30</span>
    <span class="s" style="font-size:24px">24</span>
    <span class="s" style="font-size:18px">18</span>
    <span class="s" style="font-size:16px">16</span>
    <span class="s" style="font-size:14px">14</span>
    <span class="s" style="font-size:12px">12</span>
    <span class="s" style="font-size:10px">10</span>
    <span style="font-family:var(--font-body);font-weight:400;color:var(--slate-400);font-size:13px;margin-left:14px">px · display / h1 / h2 / h3 / body / sm / xs</span>
  </div>
</body>
</html>
