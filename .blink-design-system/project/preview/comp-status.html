<!-- @dsCard group="Components" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  * { margin: 0; box-sizing: border-box; }
  body { font-family: var(--font-display); background: #fff; padding: 26px; display:flex; flex-direction:column; gap: 18px; justify-content:center; }
  .row { display:flex; gap: 12px; align-items:center; flex-wrap:wrap; }
  .pill { display:inline-flex; align-items:center; gap: 7px; border-radius: 999px; font-weight: 600; font-size: 13px; padding: 8px 16px; }
  .online { background: var(--success-bg); color: var(--success); }
  .dot { width: 8px; height: 8px; border-radius: 50%; background: currentColor; }
  .status-label { background: rgba(255,255,255,1); color: var(--slate-500); border:1px solid var(--slate-200); }
  .chip { border-radius: 999px; font-size: 12px; padding: 7px 14px; font-weight: 600; }
  .chip--on { background: var(--blink-500); color:#fff; }
  .chip--off { background: var(--slate-100); color: var(--slate-600); }
  .badge { min-width: 18px; height: 18px; border-radius: 999px; background: var(--blink-500); color:#fff; font-size: 10px; font-weight: 700; display:inline-flex; align-items:center; justify-content:center; padding: 0 5px; }
  .lbl { font-family: var(--font-body); font-size: 10px; color: var(--slate-400); text-transform: uppercase; letter-spacing: 0.06em; font-weight: 600; }
</style>
</head>
<body>
  <div class="row">
    <span class="pill online"><span class="dot"></span>Online</span>
    <span class="pill" style="background:var(--slate-100);color:var(--slate-500)"><span class="dot" style="background:var(--slate-400)"></span>Offline</span>
    <span class="badge">3</span>
    <span class="badge" style="background:var(--ios-red)">12</span>
  </div>
  <div class="row">
    <span class="chip chip--on">All rides</span>
    <span class="chip chip--off">Food</span>
    <span class="chip chip--off">Marketplace</span>
    <span class="chip chip--off">Courier</span>
  </div>
</body>
</html>
