<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="1080" viewBox="0 0 1920 1080" font-family="'Poppins','Segoe UI',Arial,sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b1220"/>
      <stop offset="0.55" stop-color="#0f172a"/>
      <stop offset="1" stop-color="#020617"/>
    </linearGradient>
    <linearGradient id="pink" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FF6C90"/>
      <stop offset="1" stop-color="#EE335F"/>
    </linearGradient>
    <linearGradient id="pinkDeep" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#EE335F"/>
      <stop offset="1" stop-color="#B9003F"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#000000" flood-opacity="0.45"/>
    </filter>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="0" stdDeviation="8" flood-color="#EE335F" flood-opacity="0.55"/>
    </filter>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L7,3 L0,6 Z" fill="#93a4c4"/>
    </marker>
    <marker id="arrowPink" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L7,3 L0,6 Z" fill="#EE335F"/>
    </marker>
  </defs>

  <rect width="1920" height="1080" fill="url(#bg)"/>
  <!-- faint grid -->
  <g stroke="#1e293b" stroke-width="1" opacity="0.5">
    <path d="M0 270 H1920 M0 850 H1920"/>
  </g>

  <!-- Title -->
  <g>
    <path d="M120 56 l-34 70 h26 l-20 60 l54 -82 h-26 z" fill="url(#pink)" filter="url(#glow)"/>
    <text x="175" y="118" font-size="64" font-weight="800" fill="#ffffff" letter-spacing="2">BLINK — System Architecture</text>
    <text x="178" y="158" font-size="25" font-weight="500" fill="#9fb0cd" letter-spacing="0.5">Multi-service delivery super-app · Algeria (DZD) · trilingual EN / FR / AR (RTL)</text>
  </g>

  <!-- ===================== COLUMN HEADERS ===================== -->
  <g font-size="20" font-weight="700" fill="#EE335F" letter-spacing="3">
    <text x="60"  y="250">CLIENTS</text>
    <text x="500" y="250">EDGE / ROUTING</text>
    <text x="830" y="250">API · blink-server (Hono)</text>
    <text x="1390" y="250">DATA · Supabase (one project)</text>
  </g>

  <!-- ===================== CLIENTS ===================== -->
  <!-- Mobile App -->
  <g filter="url(#soft)">
    <rect x="50" y="280" width="380" height="210" rx="16" fill="#111c33" stroke="#2b3b59"/>
  </g>
  <rect x="50" y="280" width="380" height="46" rx="16" fill="url(#pinkDeep)"/>
  <rect x="50" y="305" width="380" height="21" fill="url(#pinkDeep)"/>
  <text x="72" y="311" font-size="22" font-weight="700" fill="#fff">📱  Mobile App — Expo / React Native</text>
  <text x="72" y="358" font-size="16" fill="#cdd8ee">expo-router · role groups:</text>
  <g font-size="15" font-weight="600">
    <rect x="72" y="372" width="84" height="30" rx="15" fill="#1e2c49" stroke="#3a4d72"/><text x="114" y="392" fill="#dbe5f7" text-anchor="middle">Customer</text>
    <rect x="164" y="372" width="64" height="30" rx="15" fill="#1e2c49" stroke="#3a4d72"/><text x="196" y="392" fill="#dbe5f7" text-anchor="middle">Rider</text>
    <rect x="236" y="372" width="84" height="30" rx="15" fill="#1e2c49" stroke="#3a4d72"/><text x="278" y="392" fill="#dbe5f7" text-anchor="middle">Merchant</text>
    <rect x="328" y="372" width="64" height="30" rx="15" fill="#1e2c49" stroke="#3a4d72"/><text x="360" y="392" fill="#dbe5f7" text-anchor="middle">Agent</text>
  </g>
  <text x="72" y="432" font-size="15" fill="#9fb0cd">Zustand stores · i18next · SecureStore</text>
  <text x="72" y="460" font-size="15" fill="#9fb0cd">Supabase = session only · API = all data</text>

  <!-- Admin Dashboard -->
  <g filter="url(#soft)">
    <rect x="50" y="520" width="380" height="120" rx="16" fill="#111c33" stroke="#2b3b59"/>
  </g>
  <text x="72" y="558" font-size="21" font-weight="700" fill="#fff">🖥  Admin Dashboard — Next.js 16</text>
  <text x="72" y="588" font-size="15" fill="#9fb0cd">App Router · Tailwind v4 · TanStack Table</text>
  <text x="72" y="612" font-size="15" fill="#9fb0cd">Feature-first · route triad · next-intl</text>

  <!-- Landing -->
  <g filter="url(#soft)">
    <rect x="50" y="670" width="380" height="90" rx="16" fill="#111c33" stroke="#2b3b59"/>
  </g>
  <text x="72" y="708" font-size="21" font-weight="700" fill="#fff">🌐  Landing Site — Next.js</text>
  <text x="72" y="736" font-size="15" fill="#9fb0cd">Same app · split by subdomain</text>

  <!-- ===================== EDGE / MIDDLEWARE ===================== -->
  <g filter="url(#soft)">
    <rect x="490" y="520" width="270" height="240" rx="16" fill="#0e1a30" stroke="#EE335F" stroke-opacity="0.5"/>
  </g>
  <text x="510" y="558" font-size="20" font-weight="700" fill="#fff">Next.js Middleware</text>
  <text x="510" y="588" font-size="15" fill="#cdd8ee">subdomain split:</text>
  <text x="510" y="612" font-size="15" fill="#9fb0cd">dashboard.* → /d/*</text>
  <text x="510" y="636" font-size="15" fill="#9fb0cd">main domain → landing</text>
  <text x="510" y="666" font-size="15" fill="#cdd8ee">Supabase SSR auth gate</text>
  <text x="510" y="690" font-size="15" fill="#9fb0cd">unauth → /login</text>
  <line x1="510" y1="708" x2="740" y2="708" stroke="#2b3b59"/>
  <text x="510" y="734" font-size="14" fill="#7f93b6">Vercel · Edge</text>

  <!-- ===================== API SERVER ===================== -->
  <g filter="url(#soft)">
    <rect x="820" y="280" width="460" height="540" rx="18" fill="#101a30" stroke="#2b3b59"/>
  </g>
  <rect x="820" y="280" width="460" height="50" rx="18" fill="url(#pinkDeep)"/>
  <rect x="820" y="305" width="460" height="25" fill="url(#pinkDeep)"/>
  <text x="845" y="313" font-size="23" font-weight="800" fill="#fff">⬡  Hono API  ·  blink.greenpedal.net</text>

  <!-- middleware chips -->
  <g>
    <rect x="845" y="350" width="190" height="64" rx="12" fill="#16233d" stroke="#3a4d72"/>
    <text x="940" y="378" font-size="15" font-weight="700" fill="#dbe5f7" text-anchor="middle">Auth middleware</text>
    <text x="940" y="400" font-size="13" fill="#9fb0cd" text-anchor="middle">JWT verify · requireRole</text>

    <rect x="1052" y="350" width="200" height="64" rx="12" fill="#16233d" stroke="#3a4d72"/>
    <text x="1152" y="378" font-size="15" font-weight="700" fill="#dbe5f7" text-anchor="middle">Zod validators</text>
    <text x="1152" y="400" font-size="13" fill="#9fb0cd" text-anchor="middle">errorHandler · ZodError→400</text>
  </g>

  <text x="845" y="448" font-size="15" font-weight="600" fill="#EE335F">Routers — one folder per feature</text>
  <g font-size="14.5" font-weight="600">
    <rect x="845" y="462" width="98" height="30" rx="8" fill="#1b2942" stroke="#33456a"/><text x="894" y="482" fill="#dbe5f7" text-anchor="middle">/auth</text>
    <rect x="951" y="462" width="98" height="30" rx="8" fill="#1b2942" stroke="#33456a"/><text x="1000" y="482" fill="#dbe5f7" text-anchor="middle">/trips</text>
    <rect x="1057" y="462" width="98" height="30" rx="8" fill="#1b2942" stroke="#33456a"/><text x="1106" y="482" fill="#dbe5f7" text-anchor="middle">/orders</text>
    <rect x="1163" y="462" width="90" height="30" rx="8" fill="#1b2942" stroke="#33456a"/><text x="1208" y="482" fill="#dbe5f7" text-anchor="middle">/riders</text>

    <rect x="845" y="500" width="140" height="30" rx="8" fill="#1b2942" stroke="#33456a"/><text x="915" y="520" fill="#dbe5f7" text-anchor="middle">/transactions</text>
    <rect x="993" y="500" width="96" height="30" rx="8" fill="#1b2942" stroke="#33456a"/><text x="1041" y="520" fill="#dbe5f7" text-anchor="middle">/agents</text>
    <rect x="1097" y="500" width="156" height="30" rx="8" fill="#1b2942" stroke="#33456a"/><text x="1175" y="520" fill="#dbe5f7" text-anchor="middle">/notifications</text>

    <rect x="845" y="538" width="86" height="30" rx="8" fill="#1b2942" stroke="#33456a"/><text x="888" y="558" fill="#dbe5f7" text-anchor="middle">/news</text>
    <rect x="939" y="538" width="118" height="30" rx="8" fill="#1b2942" stroke="#33456a"/><text x="998" y="558" fill="#dbe5f7" text-anchor="middle">/deep-links</text>
    <rect x="1065" y="538" width="98" height="30" rx="8" fill="#1b2942" stroke="#33456a"/><text x="1114" y="558" fill="#dbe5f7" text-anchor="middle">/library</text>
    <rect x="1171" y="538" width="82" height="30" rx="8" fill="#1b2942" stroke="#33456a"/><text x="1212" y="558" fill="#dbe5f7" text-anchor="middle">/health</text>
  </g>

  <!-- runtime client note -->
  <rect x="845" y="592" width="408" height="56" rx="12" fill="#16233d" stroke="#3a4d72"/>
  <text x="1049" y="616" font-size="15" font-weight="700" fill="#dbe5f7" text-anchor="middle">Runtime queries via supabase-js</text>
  <text x="1049" y="636" font-size="13" fill="#9fb0cd" text-anchor="middle">supabaseAdmin (service role) · realtime transport = ws</text>

  <!-- host note -->
  <rect x="845" y="664" width="408" height="56" rx="12" fill="#0e1a30" stroke="#33456a"/>
  <text x="1049" y="688" font-size="15" font-weight="700" fill="#dbe5f7" text-anchor="middle">cPanel host · Passenger · esbuild bundle</text>
  <text x="1049" y="708" font-size="13" fill="#9fb0cd" text-anchor="middle">npm run deploy → bump · migrations · scp · restart · /health</text>

  <!-- Drizzle source of truth -->
  <rect x="845" y="736" width="408" height="64" rx="12" fill="#16233d" stroke="#EE335F" stroke-opacity="0.55"/>
  <text x="1049" y="762" font-size="15" font-weight="700" fill="#fff" text-anchor="middle">Drizzle ORM = schema source of truth</text>
  <text x="1049" y="784" font-size="13" fill="#9fb0cd" text-anchor="middle">src/db/schema/*.ts → supabase/migrations/NNNNN_*.sql</text>

  <!-- ===================== SUPABASE ===================== -->
  <g filter="url(#soft)">
    <rect x="1380" y="280" width="490" height="540" rx="18" fill="#0f1d18" stroke="#1f5e3f"/>
  </g>
  <rect x="1380" y="280" width="490" height="50" rx="18" fill="#16432f"/>
  <rect x="1380" y="305" width="490" height="25" fill="#16432f"/>
  <text x="1405" y="313" font-size="23" font-weight="800" fill="#3ecf8e">◭  Supabase — single shared project</text>

  <!-- Postgres -->
  <g filter="url(#soft)">
    <rect x="1405" y="356" width="440" height="190" rx="14" fill="#13243a" stroke="#34507a"/>
  </g>
  <text x="1428" y="390" font-size="20" font-weight="700" fill="#fff">🗄  PostgreSQL  ·  24 tables · RLS</text>
  <g font-size="13.5" fill="#cdd8ee">
    <text x="1428" y="420">users · rider_profiles · agent_profiles</text>
    <text x="1428" y="442">merchant_profiles · customer_profiles</text>
    <text x="1428" y="464">vehicles · trips · orders · transactions</text>
    <text x="1428" y="486">agent_shops · addresses · notifications</text>
    <text x="1428" y="508">news · deep_links · library_* · device_tokens</text>
    <text x="1428" y="530">scheduled_notifications · notification_recipients</text>
  </g>

  <!-- Auth -->
  <rect x="1405" y="566" width="212" height="110" rx="14" fill="#13243a" stroke="#34507a"/>
  <text x="1428" y="600" font-size="19" font-weight="700" fill="#fff">🔐  Auth</text>
  <text x="1428" y="628" font-size="14" fill="#cdd8ee">PKCE OAuth</text>
  <text x="1428" y="650" font-size="14" fill="#9fb0cd">Google · Apple</text>
  <text x="1428" y="670" font-size="13" fill="#9fb0cd">issues session JWT</text>

  <!-- Storage -->
  <rect x="1633" y="566" width="212" height="110" rx="14" fill="#13243a" stroke="#34507a"/>
  <text x="1656" y="600" font-size="19" font-weight="700" fill="#fff">📦  Storage</text>
  <text x="1656" y="628" font-size="14" fill="#cdd8ee">public buckets</text>
  <text x="1656" y="650" font-size="14" fill="#9fb0cd">news · library</text>
  <text x="1656" y="670" font-size="13" fill="#9fb0cd">avatars · docs</text>

  <!-- access note -->
  <rect x="1405" y="696" width="440" height="100" rx="14" fill="#0e1a30" stroke="#33456a"/>
  <text x="1625" y="724" font-size="15" font-weight="700" fill="#fff" text-anchor="middle">Access model</text>
  <text x="1625" y="750" font-size="14" fill="#cdd8ee" text-anchor="middle">anon key → RLS-scoped (mobile, public reads)</text>
  <text x="1625" y="774" font-size="14" fill="#cdd8ee" text-anchor="middle">service-role → bypasses RLS (server + dashboard only)</text>

  <!-- ===================== ARROWS ===================== -->
  <g stroke-width="2.5" fill="none" stroke-dasharray="9 7">
    <!-- mobile -> API (Bearer JWT) -->
    <path d="M430 360 H660 Q700 360 700 330 V322 Q700 305 740 305 H820" stroke="#EE335F" marker-end="url(#arrowPink)"/>
    <!-- mobile -> Supabase Auth (session) -->
    <path d="M430 410 H470 Q486 410 486 440 V900 H1500 V690" stroke="#3ecf8e" marker-end="url(#arrow)" opacity="0.85"/>
    <!-- dashboard -> middleware -->
    <path d="M430 580 H490" stroke="#93a4c4" marker-end="url(#arrow)"/>
    <!-- landing -> middleware -->
    <path d="M430 712 H470 Q490 712 490 690 V660" stroke="#93a4c4" marker-end="url(#arrow)"/>
    <!-- middleware -> API (dashboard server actions / supabase-js) -->
    <path d="M760 600 H792 Q820 600 820 560 V470" stroke="#93a4c4" marker-end="url(#arrow)"/>
    <!-- middleware -> Supabase directly (dashboard supabase-js) -->
    <path d="M760 640 H800 Q815 640 815 860 H1380 V560" stroke="#93a4c4" marker-end="url(#arrow)" opacity="0.7"/>
    <!-- API -> Supabase -->
    <path d="M1280 560 H1380" stroke="#EE335F" marker-end="url(#arrowPink)"/>
    <path d="M1280 620 H1330 Q1360 620 1360 460 H1405" stroke="#EE335F" marker-end="url(#arrowPink)" opacity="0.6"/>
  </g>
  <text x="555" y="345" font-size="14" font-weight="700" fill="#EE335F">Bearer JWT</text>
  <text x="1295" y="548" font-size="14" font-weight="700" fill="#EE335F">supabase-js</text>

  <!-- ===================== BOTTOM STRIP ===================== -->
  <g filter="url(#soft)">
    <rect x="50" y="880" width="1820" height="150" rx="16" fill="#0c1526" stroke="#243450"/>
  </g>
  <text x="80" y="922" font-size="18" font-weight="700" fill="#EE335F" letter-spacing="2">PLATFORM &amp; OPS</text>

  <!-- GitHub -->
  <rect x="80" y="940" width="300" height="70" rx="12" fill="#16233d" stroke="#3a4d72"/>
  <text x="100" y="970" font-size="17" font-weight="700" fill="#fff">⎇  GitHub · Safwa9amar</text>
  <text x="100" y="994" font-size="13.5" fill="#9fb0cd">blink · blink-server · blink-dashboard</text>

  <!-- CI / Deploy -->
  <rect x="410" y="940" width="420" height="70" rx="12" fill="#16233d" stroke="#3a4d72"/>
  <text x="430" y="970" font-size="17" font-weight="700" fill="#fff">🚀  Deploy</text>
  <text x="430" y="994" font-size="13.5" fill="#9fb0cd">server → cPanel/Passenger · dashboard → Vercel</text>

  <!-- Cron -->
  <rect x="860" y="940" width="380" height="70" rx="12" fill="#16233d" stroke="#3a4d72"/>
  <text x="880" y="970" font-size="17" font-weight="700" fill="#fff">⏱  cPanel Cron</text>
  <text x="880" y="994" font-size="13.5" fill="#9fb0cd">/library/scrape · scheduled_notifications</text>

  <!-- Schema sync -->
  <rect x="1270" y="940" width="300" height="70" rx="12" fill="#16233d" stroke="#3a4d72"/>
  <text x="1290" y="970" font-size="17" font-weight="700" fill="#fff">🔁  Types in sync</text>
  <text x="1290" y="994" font-size="13.5" fill="#9fb0cd">no shared pkg · by hand × 3 repos</text>

  <!-- Lang -->
  <rect x="1600" y="940" width="270" height="70" rx="12" fill="#16233d" stroke="#3a4d72"/>
  <text x="1620" y="970" font-size="17" font-weight="700" fill="#fff">🌍  i18n</text>
  <text x="1620" y="994" font-size="13.5" fill="#9fb0cd">EN · FR · AR (RTL)</text>

  <text x="960" y="1062" font-size="15" fill="#5f7195" text-anchor="middle">Schema flows  server → dashboard → mobile   ·   one Supabase project (DB · Auth · Storage)   ·   service-role key never ships to mobile</text>
</svg>
