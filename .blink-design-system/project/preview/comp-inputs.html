<!-- @dsCard group="Components" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  * { margin: 0; box-sizing: border-box; }
  body { font-family: var(--font-body); background: #fff; padding: 26px; display:flex; flex-direction:column; gap: 16px; justify-content:center; }
  svg { display:block; }
  .search { display:flex; align-items:center; gap: 10px; background:#fff; border:0.5px solid var(--gray-400); border-radius: var(--r-sm); padding: 11px 14px; box-shadow: var(--shadow-card); }
  .search input { border:none; outline:none; flex:1; font-family: var(--font-body); font-size: 13px; color: var(--slate-900); }
  .search input::placeholder { color: var(--slate-500); }
</style>
</head>
<body>
  <input class="blink-input" placeholder="Enter Your Mobile Number" style="width:100%">
  <div class="search">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="var(--slate-500)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0"/><circle cx="12" cy="10" r="3"/></svg>
    <input placeholder="Algerie Centre, Ya Khouuu">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="var(--blink-500)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="4" y1="6" x2="20" y2="6"/><line x1="7" y1="12" x2="17" y2="12"/><line x1="10" y1="18" x2="14" y2="18"/></svg>
  </div>
</body>
</html>
